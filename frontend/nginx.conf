server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: unknown routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable server token in response headers
    server_tokens off;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Backend API proxy (required for SPA integration)
    # Proxies /api/* to the FastAPI backend running in the docker-compose network.
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming (EventSource) compatibility
        proxy_buffering off;
        proxy_cache off;

        proxy_pass http://api:8081;
    }

    # Health check endpoint (returns 200)
    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}