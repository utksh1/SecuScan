version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secuscan
      POSTGRES_USER: secuscan
      POSTGRES_PASSWORD: secuscan
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secuscan -d secuscan"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./plugins:/app/plugins   # plugins only — don't overwrite /app wholesale
      - ./data:/app/data
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - SECUSCAN_BIND_ADDRESS=0.0.0.0   # fix: was 127.0.0.1, unreachable inside Docker
      - SECUSCAN_BIND_PORT=8081
      - SECUSCAN_POSTGRES_DSN=postgresql://secuscan:secuscan@postgres:5432/secuscan
      - SECUSCAN_REDIS_URL=redis://redis:6379/0
      - SECUSCAN_PLUGINS_DIR=/app/plugins
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8081/api/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  frontend:
    image: node:20-alpine          # intentional: dev mode uses node directly
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"  # fix: expose to Docker network
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - VITE_API_BASE=http://127.0.0.1:8081/api
    volumes:
      - ./frontend:/app
    depends_on:
      api:
        condition: service_healthy   # wait for api to be ready, not just started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
