name: Docker Image Hardening & Vulnerability Scan

on:
  push:
    branches: [main]
    paths:
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "backend/requirements*.txt"
      - "frontend/package*.json"
      - ".github/workflows/docker-image-scan.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "backend/requirements*.txt"
      - "frontend/package*.json"
      - ".github/workflows/docker-image-scan.yml"
  schedule:
    # Run weekly on Monday at 06:00 UTC to catch new CVEs in pinned base images
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required to upload SARIF to GitHub Security tab

jobs:

  # 1. Build both images

  build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: secuscan-backend
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: secuscan-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Save image as tar
        run: docker save ${{ matrix.image }}:ci -o /tmp/${{ matrix.image }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}-tar
          path: /tmp/${{ matrix.image }}.tar
          retention-days: 1

  # 2. Trivy vulnerability scan

  trivy-scan:
    name: Trivy scan – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image: secuscan-backend
          - service: frontend
            image: secuscan-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.image }}-tar
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/${{ matrix.image }}.tar

      - name: Run Trivy – table output (human-readable)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:ci
          format: table
          exit-code: "0"          # don't fail here; fail only on SARIF/JSON step
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Run Trivy – SARIF report (upload to Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Run Trivy – JSON report (artifact)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:ci
          format: json
          output: trivy-${{ matrix.service }}.json
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload JSON vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.json
          retention-days: 30

      - name: Fail on CRITICAL vulnerabilities (policy gate)
        # Re-run with exit-code 1 so the job fails if there are unfixed CRITICALs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

  # 3. Structural hardening checks

  hardening-check:
    name: Hardening checks – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image: secuscan-backend
          - service: frontend
            image: secuscan-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.image }}-tar
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/${{ matrix.image }}.tar

      # Non-root user check
      - name: Assert container does NOT run as root
        run: |
          WHOAMI=$(docker run --rm ${{ matrix.image }}:ci whoami 2>/dev/null || true)
          UID_VAL=$(docker run --rm ${{ matrix.image }}:ci id -u 2>/dev/null || echo "0")
          echo "Container user: ${WHOAMI} (UID=${UID_VAL})"
          if [ "${UID_VAL}" = "0" ]; then
            echo "FAIL: ${{ matrix.service }} container runs as root (UID 0)."
            echo "   Add a non-root USER instruction to the Dockerfile."
            exit 1
          fi
          echo "PASS: running as non-root user '${WHOAMI}' (UID=${UID_VAL})"

      # No SUID/SGID binaries
      - name: Check for unexpected SUID/SGID binaries
        run: |
          SUID_FILES=$(docker run --rm --entrypoint find ${{ matrix.image }}:ci \
            / -xdev \( -perm -4000 -o -perm -2000 \) -type f 2>/dev/null || true)
          if [ -n "${SUID_FILES}" ]; then
            echo "WARNING: SUID/SGID binaries found in ${{ matrix.service }} image:"
            echo "${SUID_FILES}"
            # Warn but don't fail – some base images include ping/su; document if intentional
          else
            echo "PASS: No unexpected SUID/SGID binaries."
          fi

      # No secrets baked into image
      - name: Scan image layers for secrets (Trivy secret scanner)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:ci
          format: table
          exit-code: "1"
          scanners: secret
          severity: CRITICAL,HIGH,MEDIUM

      # Dockerfile lint (hadolint)
      - name: Lint ${{ matrix.service }} Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./${{ matrix.service }}/Dockerfile
          failure-threshold: error


  # 4. Synthetic CVE baseline test
  #    Verifies the scan correctly fails when a
  #    known-vulnerable image is provided.

  synthetic-cve-test:
    name: Synthetic CVE policy gate test
    runs-on: ubuntu-latest

    steps:
      - name: Pull deliberately vulnerable image (python:3.8-slim – old, has known CVEs)
        run: docker pull python:3.8.20-slim-bullseye

      - name: Trivy scan of vulnerable image – expect non-zero exit
        id: vuln_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: python:3.8.20-slim-bullseye
          format: table
          exit-code: "1"
          ignore-unfixed: false
          vuln-type: os,library
          severity: CRITICAL

      - name: Assert scan correctly failed (policy gate works)
        run: |
          if [ "${{ steps.vuln_scan.outcome }}" = "failure" ]; then
            echo "PASS: Policy gate correctly rejected a known-vulnerable image."
          else
            echo "FAIL: Policy gate did NOT reject a known-vulnerable image. Check Trivy config."
            exit 1
          fi