name: Update Plugin Checksum Manifest
on:
  workflow_dispatch:

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/plugin-checksum-verification
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Regenerate manifest on Linux
        run: python scripts/refresh_plugin_checksums.py
      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/checksums.json
          git diff --cached --quiet || git commit -m "chore(ci): regenerate checksum manifest with Linux line endings"
          git push
