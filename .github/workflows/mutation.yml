name: Mutation Testing

on:
  push:
    paths:
      - "backend/secuscan/validation.py"
      - "backend/secuscan/redaction.py"
      - "testing/backend/unit/test_validation.py"
      - "testing/backend/unit/test_redaction.py"
      - "testing/backend/unit/test_task_start_validation.py"
      - ".github/workflows/mutation.yml"
  pull_request:
    paths:
      - "backend/secuscan/validation.py"
      - "backend/secuscan/redaction.py"
      - "testing/backend/unit/test_validation.py"
      - "testing/backend/unit/test_redaction.py"
      - "testing/backend/unit/test_task_start_validation.py"
      - ".github/workflows/mutation.yml"
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation-testing:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run mutation tests
        run: mutmut run

      - name: Print mutation results summary
        if: always()
        run: mutmut results

      - name: Generate HTML report
        if: always()
        run: mutmut html

      - name: Upload mutation report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: html/
          retention-days: 30

      - name: Enforce mutation score threshold
        run: |
          python - <<'EOF'
          import subprocess, sys, re

          raw = subprocess.check_output(["mutmut", "results"], text=True)

          killed   = len(re.findall(r"Killed",   raw, re.IGNORECASE))
          survived = len(re.findall(r"Survived", raw, re.IGNORECASE))
          total    = killed + survived

          if total == 0:
              print("No mutants generated — check paths_to_mutate in mutmut.toml")
              sys.exit(1)

          score = killed / total * 100
          print(f"Mutation score: {score:.1f}%  ({killed} killed / {total} total)")

          if score < 80.0:
              print(f"FAIL: mutation score {score:.1f}% is below the required 80%")
              sys.exit(1)

          print("PASS: mutation score meets the 80% threshold")
          EOF